<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Dashboard XPT</title>

<link rel="icon" href="image.png">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script type="module" src="dashboard.js"></script>
</head>

<body>

<div class="dashboard" id="dashboard">

  <header class="topbar">
      <div class="brand">
          <img src="image.png" class="logo">
          <div class="title-group">
              <h1>Dashboard Operacional</h1>
              <span>Performance Logística | SLA & DS</span>
          </div>
      </div>

      <div class="actions">
          <button class="nav active">Início</button>
          <button class="nav">Entregadores</button>
          <button id="btnExportar" class="print">📸 Exportar</button>
      </div>
  </header>

  <section class="control-bar">
      <div class="uploads">
          <div>
              <label>SLA</label>
              <input type="file" id="csvInput" accept=".csv">
          </div>
          <div>
              <label>DS</label>
              <input type="file" id="dsInput" accept=".csv">
          </div>
      </div>

      <div class="filters">
          <select id="driverSelect">
              <option value="">Todos os Entregadores</option>
          </select>

          <select id="citySelect">
              <option value="">Todas as Cidades</option>
          </select>
      </div>
  </section>

  <section class="main-grid">

      <div class="kpi-grid">
          <div class="kpi"><span>Total</span><strong id="kpiTotal">0</strong></div>
          <div class="kpi"><span>Entregues</span><strong id="kpiDelivered">0</strong></div>
          <div class="kpi"><span>Pendentes</span><strong id="kpiPending">0</strong></div>
          <div class="kpi"><span>SLA</span><strong id="kpiSla">0%</strong></div>
          <div class="kpi"><span>Meta 98%</span><strong id="kpiForecast">0</strong></div>
          <div class="kpi"><span>DS</span><strong id="kpiDs">0%</strong></div>
      </div>

      <!-- GRÁFICOS -->
      <div class="chart-grid">

        <div class="card">
          <canvas id="barChart"></canvas>
        </div>

        <div class="card">
          <canvas id="pieChart"></canvas>
        </div>

      </div>

  </section>

</div>

<script>
document.getElementById("btnExportar").addEventListener("click", function () {
    const area = document.getElementById("dashboard");

    html2canvas(area).then(canvas => {
        const link = document.createElement("a");
        link.download = "dashboard-xpt.png";
        link.href = canvas.toDataURL();
        link.click();
    });
});
</script>

</body>
</html>
